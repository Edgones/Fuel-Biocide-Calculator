<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Hangar - Dashboard de Auditoria</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
        /* Customização leve da barra de rolagem para manter o design Brutalist */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1A1C1E; }
        ::-webkit-scrollbar-thumb { background: #43474E; rounded: 3px; }
    </style>
</head>
<body class="bg-[#121416] text-[#E3E2E6] min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-5xl flex flex-col gap-6">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-[#1A1C1E] p-6 rounded-2xl gap-4 shadow-xl">
            <div class="flex flex-col">
                <span class="text-[#A3C9FF] text-xl font-bold tracking-wider font-mono">PAINEL DE GOVERNANÇA E AUDITORIA</span>
                <span class="text-xs text-[#74777F] font-mono">HISTÓRICO IMUTÁVEL DE REABASTECIMENTO</span>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="exportToCSV()" class="bg-[#24262A] text-[#A3C9FF] font-semibold px-4 py-3 rounded-xl text-xs font-mono tracking-wide transition-all hover:bg-[#2F4563]/30 cursor-pointer w-1/2 md:w-auto">
                    EXPORTAR CSV
                </button>
                <button onclick="window.location.href='./calculadora.html'" class="bg-[#A3C9FF] text-[#00315E] font-bold px-5 py-3 rounded-xl text-xs tracking-wide transition-all hover:bg-[#C2DCFF] cursor-pointer w-1/2 md:w-auto">
                    VOLTAR À CALCULADORA
                </button>
            </div>
        </div>

        <div class="bg-[#1A1C1E] p-4 rounded-xl flex flex-col md:flex-row gap-4">
            <input type="text" id="search-acft" placeholder="Filtrar por Matrícula (Ex: PR-FUP)..." oninput="filterLogs()"
                   class="bg-[#24262A] text-white p-3 rounded-xl text-sm border-none focus:outline-none focus:ring-2 focus:ring-[#A3C9FF] font-mono flex-1">
            <input type="text" id="search-inspector" placeholder="Filtrar por ID do Inspetor..." oninput="filterLogs()"
                   class="bg-[#24262A] text-white p-3 rounded-xl text-sm border-none focus:outline-none focus:ring-2 focus:ring-[#A3C9FF] font-mono md:w-64">
        </div>

        <div class="bg-[#1A1C1E] rounded-2xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#24262A] text-[#C4C6D0] font-mono text-xs uppercase tracking-wider">
                            <th class="p-4">Data/Hora</th>
                            <th class="p-4">Inspetor</th>
                            <th class="p-4">Prefixo / ICAO</th>
                            <th class="p-4 text-right">Massa Inicial</th>
                            <th class="p-4 text-right">Massa Final</th>
                            <th class="p-4 text-right">Uplift L</th>
                            <th class="p-4 text-right text-[#A3C9FF]">Biocida</th>
                            <th class="p-4">Hash de Integridade (SHA-256)</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body" class="text-sm font-mono divide-y divide-[#43474E]/30">
                        <tr id="loading-row">
                            <td colspan="8" class="p-8 text-center text-[#74777F]">Conectando ao banco de dados Firestore...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './backend/firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Array global para reter os logs em memória para filtros rápidos sem novas requisições
        window.allLogs = [];

        window.addEventListener('load', async () => {
            // Verifica se o usuário está autenticado localmente antes de liberar os dados de auditoria
            if (!localStorage.getItem('kinetic_session')) {
                window.location.href = './index.html';
                return;
            }
            await fetchLogsFromFirestore();
        });

        async function fetchLogsFromFirestore() {
            const tableBody = document.getElementById('log-table-body');
            try {
                // Monta a query trazendo os registros mais recentes primeiro
                const q = query(collection(db, "biocide_logs"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                window.allLogs = [];
                querySnapshot.forEach((doc) => {
                    window.allLogs.push(doc.data());
                });

                renderLogs(window.allLogs);

            } catch (error) {
                console.error("Erro ao ler logs do Firestore:", error);
                document.getElementById('loading-row').innerHTML = `
                    <td colspan="8" class="p-8 text-center text-[#FFDAD7] bg-[#3A1414]/40">
                        Erro de Conexão: Não foi possível sincronizar os registros. Verifique as credenciais do Firebase.
                    </td>`;
            }
        }

        window.renderLogs = function(logsToRender) {
            const tableBody = document.getElementById('log-table-body');
            
            if (logsToRender.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-[#74777F]">Nenhum registro de aditivação encontrado para os filtros aplicados.</td></tr>`;
                return;
            }

            tableBody.innerHTML = logsToRender.map(log => {
                const date = new Date(log.timestamp).toLocaleString('pt-BR');
                return `
                    <tr class="hover:bg-[#24262A]/40 transition-colors">
                        <td class="p-4 text-[#C4C6D0] whitespace-nowrap">${date}</td>
                        <td class="p-4 font-bold text-white">${log.operatorId}</td>
                        <td class="p-4 whitespace-nowrap">
                            <span class="text-white font-bold block">${log.tailNumber || 'N/A'}</span>
                            <span class="text-xs text-[#74777F]">${log.aircraftId}</span>
                        </td>
                        <td class="p-4 text-right">${log.fobCurrent.toLocaleString('pt-BR')} ${log.unit}</td>
                        <td class="p-4 text-right">${log.fobTarget.toLocaleString('pt-BR')} ${log.unit}</td>
                        <td class="p-4 text-right text-[#C4C6D0]">${log.volumeToTreatL.toLocaleString('pt-BR')} L</td>
                        <td class="p-4 text-right font-bold text-[#A3C9FF]">${log.biocideMl.toLocaleString('pt-BR')} ml</td>
                        <td class="p-4 opacity-40 text-xs truncate max-w-[120px]" title="${log.verificationHash || 'Sem assinatura'}">
                            ${log.verificationHash || '---'}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.filterLogs = function() {
            const acftFilter = document.getElementById('search-acft').value.toUpperCase();
            const inspectorFilter = document.getElementById('search-inspector').value.toUpperCase();

            const filtered = window.allLogs.filter(log => {
                const matchesAcft = (log.tailNumber && log.tailNumber.toUpperCase().includes(acftFilter)) || log.aircraftId.toUpperCase().includes(acftFilter);
                const matchesInspector = log.operatorId.toUpperCase().includes(inspectorFilter);
                return matchesAcft && matchesInspector;
            });

            renderLogs(filtered);
        }

        window.exportToCSV = function() {
            if (window.allLogs.length === 0) return;

            const headers = ["Timestamp", "OperatorID", "AircraftICAO", "TailNumber", "FobCurrent", "FobTarget", "Unit", "Density", "VolumeTreatedL", "BiocideMl", "Hash"];
            const rows = window.allLogs.map(log => [
                log.timestamp, log.operatorId, log.aircraftId, log.tailNumber || 'N/A', 
                log.fobCurrent, log.fobTarget, log.unit, log.density, log.volumeToTreatL, log.biocideMl, log.verificationHash || ''
            ]);

            const csvContent = "data:text/csv;charset=utf-8," 
                + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `KINETIC_LOGBOOK_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
